name: BBB living repo

# Republish the BBB-Alzheimer frontier to https://vela-hub.fly.dev
# each Monday at 14:00 UTC. The signed manifest gets a fresh
# signed_publish_at on every run, so the public hub always reflects
# main's current state with a recent timestamp.
#
# Recompilation lives outside CI (needs LLM credentials and human
# review). This workflow signs and publishes whatever's in main.
#
# The bot identity (`reviewer:bbb-bot`) is registered in the frontier
# itself with tier=auto-notes; the private key lives only in the
# VELA_BBB_BOT_KEY secret. Doctrine: the signature is the bind, not
# repo write access.

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

env:
  HUB_URL: https://vela-hub.fly.dev
  FRONTIER_PATH: frontiers/bbb-alzheimer.json
  RAW_LOCATOR: https://raw.githubusercontent.com/vela-science/vela/main/frontiers/bbb-alzheimer.json

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.89'

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-bbb-living-${{ hashFiles('**/Cargo.lock') }}

      - name: Build vela CLI
        run: cargo build --release --bin vela

      - name: Stage bot key (mode 0600)
        env:
          VELA_BBB_BOT_KEY: ${{ secrets.VELA_BBB_BOT_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/keys" && chmod 700 "$RUNNER_TEMP/keys"
          umask 077
          printf '%s' "$VELA_BBB_BOT_KEY" > "$RUNNER_TEMP/keys/bbb-bot.key"

      - name: Publish to public hub
        id: publish
        run: |
          set -euo pipefail
          OUT=$(./target/release/vela registry publish "$FRONTIER_PATH" \
            --owner reviewer:bbb-bot \
            --key "$RUNNER_TEMP/keys/bbb-bot.key" \
            --locator "$RAW_LOCATOR" \
            --to "$HUB_URL" \
            --json)
          echo "$OUT"
          echo "$OUT" > "$RUNNER_TEMP/publish.json"
          {
            echo "vfr_id=$(jq -r .vfr_id < "$RUNNER_TEMP/publish.json")"
            echo "snapshot_hash=$(jq -r .snapshot_hash < "$RUNNER_TEMP/publish.json")"
            echo "event_log_hash=$(jq -r .event_log_hash < "$RUNNER_TEMP/publish.json")"
            echo "signed_publish_at=$(jq -r .signed_publish_at < "$RUNNER_TEMP/publish.json")"
            echo "duplicate=$(jq -r .duplicate < "$RUNNER_TEMP/publish.json")"
          } >> "$GITHUB_OUTPUT"

      - name: Job summary
        run: |
          {
            echo "## BBB living-repo publish"
            echo ""
            echo "- **vfr_id**: \`${{ steps.publish.outputs.vfr_id }}\`"
            echo "- **snapshot_hash**: \`${{ steps.publish.outputs.snapshot_hash }}\`"
            echo "- **event_log_hash**: \`${{ steps.publish.outputs.event_log_hash }}\`"
            echo "- **signed_publish_at**: \`${{ steps.publish.outputs.signed_publish_at }}\`"
            echo "- **duplicate**: \`${{ steps.publish.outputs.duplicate }}\`"
            echo "- **public hub**: <https://vela-hub.fly.dev/entries/${{ steps.publish.outputs.vfr_id }}>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Wipe staged bot key
        if: always()
        run: rm -f "$RUNNER_TEMP/keys/bbb-bot.key"
