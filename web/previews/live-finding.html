<!doctype html>
<html lang="en" data-v4>
<head>
<meta charset="utf-8">
<title>Finding · Vela Workbench (live)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/_v4.css">
<link rel="icon" type="image/svg+xml" href="../assets/brand/favicon.svg">
<style>
  .lp-page { display: grid; grid-template-columns: minmax(0,1fr) 360px; gap: 32px; padding: 32px 40px; max-width: 1320px; margin: 0 auto; font-family: "Inter", sans-serif; color: var(--ink-1, #1B1F27); }
  .lp-eyebrow { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.08em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 4px; }
  .lp-id { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--ink-3); }
  .lp-claim { font-family: "Source Serif 4", serif; font-size: 22px; font-weight: 500; line-height: 1.4; margin: 6px 0 16px; color: var(--ink-0); }
  .lp-meta { font-size: 13px; color: var(--ink-2); margin-bottom: 28px; line-height: 1.5; }
  .lp-section { margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(27,31,39,0.14); }
  .lp-section h2 { font-family: "JetBrains Mono", monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; color: var(--ink-3); text-transform: uppercase; margin: 0 0 12px; }
  .lp-chip { display: inline-block; font-family: "JetBrains Mono", monospace; font-size: 10px; padding: 2px 6px; border: 1px solid rgba(27,31,39,0.14); margin-right: 4px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .lp-chip.on { border-color: rgba(63,107,78,0.4); background: rgba(63,107,78,0.08); color: #3F6B4E; }
  .lp-chip.contested { border-color: rgba(166,78,67,0.4); background: rgba(166,78,67,0.08); color: #A64E43; }
  .lp-chip.gap { border-color: rgba(154,124,49,0.4); background: rgba(154,124,49,0.08); color: #9A7C31; }
  .lp-row { padding: 8px 0; border-bottom: 1px solid rgba(27,31,39,0.06); font-size: 13px; }
  .lp-row:last-child { border-bottom: 0; }
  .lp-ann { padding: 12px 0; border-bottom: 1px solid rgba(27,31,39,0.06); }
  .lp-ann-text { font-family: "Source Serif 4", serif; font-size: 14px; line-height: 1.5; color: var(--ink-1); }
  .lp-ann-meta { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--ink-3); margin-top: 4px; }
  .lp-prov { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--ink-3); margin-top: 6px; padding: 6px 10px; background: rgba(59,91,219,0.06); border-left: 2px solid rgba(59,91,219,0.32); }
  .lp-prov a { color: #3B5BDB; text-decoration: none; }
  .lp-prov a:hover { text-decoration: underline; }
  .lp-side { padding: 24px; border: 1px solid rgba(27,31,39,0.14); background: #EFEAE0; align-self: start; position: sticky; top: 24px; }
  .lp-side h2 { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.08em; color: var(--ink-3); text-transform: uppercase; margin: 0 0 12px; }
  .lp-prop { padding: 10px 0; border-bottom: 1px solid rgba(27,31,39,0.06); }
  .lp-prop-meta { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--ink-3); margin-bottom: 4px; }
  .lp-prop-text { font-family: "Source Serif 4", serif; font-size: 13px; line-height: 1.4; color: var(--ink-1); }
  .lp-prop-actions { margin-top: 6px; display: flex; gap: 6px; }
  .lp-btn { font-family: "Inter", sans-serif; font-size: 11px; padding: 4px 8px; border: 1px solid rgba(27,31,39,0.24); background: #F4F0E8; cursor: pointer; }
  .lp-btn:hover { background: #E7E1D4; }
  .lp-btn.accept { border-color: rgba(63,107,78,0.4); color: #3F6B4E; }
  .lp-btn.reject { border-color: rgba(166,78,67,0.4); color: #A64E43; }
  .lp-back { font-family: "Inter", sans-serif; font-size: 12px; color: #3B5BDB; text-decoration: none; display: inline-block; margin-bottom: 24px; }
  .lp-back:hover { text-decoration: underline; }
  .lp-empty { text-align: center; padding: 40px 20px; color: var(--ink-3); font-style: italic; }
  .lp-toast { position: fixed; bottom: 24px; right: 24px; background: #15181E; color: #F4F0E8; padding: 10px 14px; font-family: "JetBrains Mono", monospace; font-size: 12px; max-width: 360px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .lp-toast.show { opacity: 1; }
</style>
</head>
<body class="v4">
<div class="lp-page">
  <div class="lp-main">
    <a class="lp-back" href="live-frontier.html">← back to frontier</a>
    <div class="lp-eyebrow">Workbench · Finding · Live</div>
    <div id="lp-content"><div class="lp-empty">Loading finding…</div></div>
  </div>
  <aside class="lp-side">
    <h2>Queued review</h2>
    <div id="lp-queue"><div class="lp-empty">No pending proposals.</div></div>
  </aside>
</div>
<div class="lp-toast" id="lp-toast"></div>

<script src="../scripts/workbench.js"></script>
<script>
function toast(msg, ms = 2500) {
  const el = document.getElementById('lp-toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

function chip(label, klass) {
  return `<span class="lp-chip ${klass||''}">${window.vela.escapeHtml(label)}</span>`;
}

function renderFinding(f) {
  const escape = window.vela.escapeHtml;
  const scope = ['in_vivo','in_vitro','human_data','clinical_trial']
    .filter(k => f.conditions?.[k])
    .map(k => chip(k.replace('_',' '), 'on')).join('');
  const flags = ['contested','gap','retracted','negative_space']
    .filter(k => f.flags?.[k]).map(k => chip(k.replace('_',' '), k)).join('');
  const conf = f.confidence?.score?.toFixed(3) ?? '?';
  const basis = f.confidence?.basis ?? '';
  const conditionsText = f.conditions?.text || '';
  const evidence = (f.evidence?.evidence_spans || []).map(span =>
    `<div class="lp-row">${escape(span.text || JSON.stringify(span))}</div>`
  ).join('') || '<div class="lp-row lp-id">no spans recorded</div>';
  const links = (f.links || []).map(l =>
    `<div class="lp-row"><span class="lp-id">${escape(l.type)}</span> → <span class="lp-id">${escape(l.target)}</span> ${l.note ? '· ' + escape(l.note) : ''}</div>`
  ).join('') || '<div class="lp-row lp-id">no links</div>';
  const annotations = (f.annotations || []).map(ann => `
    <div class="lp-ann">
      <div class="lp-ann-text">${escape(ann.text)}</div>
      <div class="lp-ann-meta">${escape(ann.author || '?')} · ${window.vela.fmtDate(ann.timestamp)} · ${escape(ann.id)}</div>
      ${ann.provenance ? `<div class="lp-prov">${window.vela.provenanceLink(ann.provenance)}${ann.provenance.span ? ' · "' + escape(ann.provenance.span.slice(0,200)) + '"' : ''}</div>` : ''}
    </div>
  `).join('') || '<div class="lp-empty">No annotations.</div>';
  const prov = f.provenance || {};
  const provLink = prov.doi ? `<a href="https://doi.org/${escape(prov.doi)}" target="_blank">doi:${escape(prov.doi)}</a>` : (prov.pmid ? `<a href="https://pubmed.ncbi.nlm.nih.gov/${escape(prov.pmid)}" target="_blank">PMID:${escape(prov.pmid)}</a>` : escape(prov.title || '—'));

  document.getElementById('lp-content').innerHTML = `
    <div class="lp-id">${escape(f.id)}</div>
    <h1 class="lp-claim">${escape(f.assertion?.text || '?')}</h1>
    <div class="lp-meta">
      type <span class="lp-id">${escape(f.assertion?.type || '?')}</span> ·
      conf <span class="lp-id">${conf}</span> ·
      ${scope || '<span class="lp-id">no scope</span>'} ${flags || ''}
    </div>

    <div class="lp-section">
      <h2>Provenance</h2>
      <div class="lp-row">${provLink} ${prov.year ? '· ' + prov.year : ''} ${prov.journal ? '· ' + escape(prov.journal) : ''}</div>
      <div class="lp-row lp-id">source_type: ${escape(prov.source_type || '?')}</div>
    </div>

    <div class="lp-section">
      <h2>Conditions</h2>
      <div class="lp-row">${escape(conditionsText) || '<span class="lp-id">none</span>'}</div>
    </div>

    <div class="lp-section">
      <h2>Confidence basis</h2>
      <div class="lp-row">${escape(basis) || '<span class="lp-id">—</span>'}</div>
    </div>

    <div class="lp-section">
      <h2>Evidence spans</h2>
      ${evidence}
    </div>

    <div class="lp-section">
      <h2>Links (${(f.links || []).length})</h2>
      ${links}
    </div>

    <div class="lp-section">
      <h2>Annotations (${(f.annotations || []).length})</h2>
      ${annotations}
    </div>
  `;
}

function renderQueue(proposals, reviewer) {
  const el = document.getElementById('lp-queue');
  if (proposals.length === 0) {
    el.innerHTML = '<div class="lp-empty">No pending proposals for this finding.</div>';
    return;
  }
  el.innerHTML = '';
  for (const p of proposals) {
    const div = document.createElement('div');
    div.className = 'lp-prop';
    const text = p.payload?.text ? `"${p.payload.text.slice(0,140)}…"` : (p.payload?.status || '');
    div.innerHTML = `
      <div class="lp-prop-meta">${window.vela.escapeHtml(p.kind)} · ${window.vela.escapeHtml(p.actor.id)} · ${window.vela.escapeHtml(p.id)}</div>
      <div class="lp-prop-text">${window.vela.escapeHtml(p.reason)}</div>
      ${text ? `<div class="lp-prop-text" style="color:#6B7386;font-size:12px;margin-top:4px">${window.vela.escapeHtml(text)}</div>` : ''}
      <div class="lp-prop-actions">
        <button class="lp-btn accept">Accept</button>
        <button class="lp-btn reject">Reject</button>
      </div>
    `;
    div.querySelector('.lp-btn.accept').onclick = () => onDecision('accept_proposal', p.id, reviewer);
    div.querySelector('.lp-btn.reject').onclick = () => onDecision('reject_proposal', p.id, reviewer);
    el.appendChild(div);
  }
}

async function onDecision(kind, proposal_id, reviewer_id) {
  const reason = prompt(
    `Reason for ${kind === 'accept_proposal' ? 'accepting' : 'rejecting'} ${proposal_id}:`,
    kind === 'accept_proposal' ? 'reviewed and accepted' : 'reviewed and rejected'
  );
  if (!reason) return;
  try {
    await window.vela.queueAction(kind, {
      proposal_id, reviewer_id, reason, timestamp: new Date().toISOString(),
    });
    toast(`queued ${kind} on ${proposal_id} — sign with vela queue sign`);
  } catch (err) {
    toast(`error: ${err.message}`, 4000);
  }
}

async function bootstrap() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) {
    document.getElementById('lp-content').innerHTML = '<div class="lp-empty">Missing ?id= parameter. Open from <a href="live-frontier.html">live-frontier.html</a>.</div>';
    return;
  }
  try {
    const [finding, frontier] = await Promise.all([
      window.vela.fetchFinding(id),
      window.vela.fetchFrontier(),
    ]);
    renderFinding(finding);
    let reviewer = (frontier.actors?.[0]?.id) || localStorage.getItem('vela.reviewer') || '';
    if (!reviewer) {
      reviewer = prompt('Reviewer id (must be registered via `vela actor add`):', 'reviewer:you') || '';
      if (reviewer) localStorage.setItem('vela.reviewer', reviewer);
    }
    const queued = (frontier.proposals || []).filter(p => p.status === 'pending_review' && p.target?.id === id);
    renderQueue(queued, reviewer);
  } catch (err) {
    document.getElementById('lp-content').innerHTML = `<div class="lp-empty">Error: ${window.vela.escapeHtml(err.message)}</div>`;
  }
}
bootstrap();
</script>
</body>
</html>
