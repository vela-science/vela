server {
  listen 8080 default_server;
  listen [::]:8080 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Astro emits directory routes (.../page/index.html). Strip trailing
  # slashes for clean URLs and try a few patterns before 404.
  location / {
    try_files $uri $uri/index.html $uri.html =404;
  }

  # Brand assets — long cache (content-hashed by Astro for everything
  # under _astro/, but raw brand SVGs live at /brand/).
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location /brand/ {
    expires 1d;
    add_header Cache-Control "public";
  }

  # 404 — Astro doesn't emit a 404.html by default; nginx default is fine.
  error_page 404 = /404/;

  # Healthcheck endpoint for Fly.
  location = /_health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Compress text assets.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 256;
}
