resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
resolver_timeout 5s;

server {
  listen 8080 default_server;
  listen [::]:8080 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Astro emits directory routes (.../page/index.html). Strip trailing
  # slashes for clean URLs and try a few patterns before 404.
  location / {
    try_files $uri $uri/index.html $uri.html =404;
  }

  # Workbench API proxy. The site fetches /api/frontier, /api/findings,
  # /api/queue, etc. as same-origin; nginx forwards to the workbench
  # Fly app. Single domain → no CORS, single mental model.
  location /api/ {
    set $workbench_upstream "vela-workbench.fly.dev";
    proxy_pass https://$workbench_upstream;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_ssl_name $workbench_upstream;
    proxy_set_header Host $workbench_upstream;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    # The API is read-mostly; one POST endpoint (queue) deliberately
    # passes through with the body intact.
    proxy_request_buffering off;
  }

  # Brand assets — long cache (content-hashed by Astro for everything
  # under _astro/, but raw brand SVGs live at /brand/).
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location /brand/ {
    expires 1d;
    add_header Cache-Control "public";
  }

  # 404 — Astro doesn't emit a 404.html by default; nginx default is fine.
  error_page 404 = /404/;

  # Healthcheck endpoint for Fly.
  location = /_health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Compress text assets.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 256;
}
